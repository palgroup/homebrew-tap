name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.0)"
        required: true
      run_id:
        description: "palbase CI run ID to download artifacts from"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts from palbase CI
        env:
          GH_TOKEN: ${{ secrets.PALBASE_TOKEN }}
        run: |
          gh run download ${{ inputs.run_id }} \
            --repo seklabsnet/palbase \
            --name cli-binaries \
            --dir dist

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"

          gh release delete "$VERSION" --repo seklabsnet/homebrew-tap --yes 2>/dev/null || true

          gh release create "$VERSION" \
            --repo seklabsnet/homebrew-tap \
            --title "Palbase CLI $VERSION" \
            --notes "Palbase CLI release $VERSION" \
            dist/*.tar.gz dist/*.zip dist/checksums.txt
